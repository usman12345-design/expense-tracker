services:
  # PHP-FPM Application Service
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: expensepilot-app
    environment:
       - PHP_IDE_CONFIG=serverName=localhost
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "9003:9003"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - ./xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
      - ./local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - db
    networks:
      - expensepilot-network

  # Nginx Web Server Service
  webserver:
    image: nginx:alpine
    container_name: expensepilot-webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - expensepilot-network

  # MySQL Database Service
  db:
    image: mysql:8.4
    container_name: expensepilot-db
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: expensepilot
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - expensepilot-network

  mailhog:
    container_name: expensepilot-mailhog
    image: mailhog/mailhog
    restart: always
    logging:
      driver: "none"
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - expensepilot-network

  node:
    image: node:20-slim
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "npm install"
    networks:
      - expensepilot-network

# Networks
networks:
  expensepilot-network:
    driver: bridge

# Volumes
volumes:
  vendor_data:
  db_data: